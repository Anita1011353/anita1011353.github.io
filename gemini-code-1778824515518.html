<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>職安與永續技術知識庫 | 專業門戶</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #003366;
            --accent-gold: #ffc107;
        }

        body {
            font-family: 'Segoe UI', 'Noto Sans TC', sans-serif;
            background-color: #f4f7f9;
        }

        /* 英雄區塊 */
        .hero {
            background: linear-gradient(rgba(0, 51, 102, 0.7), rgba(0, 51, 102, 0.9)), 
                        url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 120px 0;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* 資源卡片 */
        .resource-card {
            border: none;
            border-radius: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            height: 100%;
        }

        .resource-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 45px rgba(0,51,102,0.15);
        }

        .card-icon {
            font-size: 3rem;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        .btn-main {
            background-color: var(--primary-blue);
            color: white;
            border-radius: 25px;
            padding: 10px 30px;
            font-weight: 600;
        }

        .btn-main:hover {
            background-color: #004488;
            color: white;
        }

        footer {
            background-color: var(--primary-blue);
            color: rgba(255,255,255,0.7);
            padding: 40px 0;
            margin-top: 80px;
        }
    </style>
</head>
<body>

<section class="hero">
    <div class="container">
        <h1>技術資源知識庫</h1>
        <p class="lead text-light">專注於職業安全衛生、化學品管理與永續發展的深度解析</p>
    </div>
</section>

<div class="container my-5">
    <div class="row g-4 justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card resource-card p-4">
                <div class="text-center">
                    <div class="card-icon">🧪</div>
                    <h3 class="fw-bold">化學品分級管理</h3>
                    <p class="text-muted">深入解析 CCB 分類代碼、起源邏輯與台灣法規實務體系。</p>
                    <a href="化學品分級管理 (CCB)：分類代碼解析.html" class="btn btn-main mt-3">進入報告</a>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card resource-card p-4" style="opacity: 0.7;">
                <div class="text-center">
                    <div class="card-icon">🏗️</div>
                    <h3 class="fw-bold">ISO 45001 實務</h3>
                    <p class="text-muted">職業安全衛生管理系統建立、稽核重點與場域應用。 (即將推出)</p>
                    <button class="btn btn-secondary mt-3" disabled>建構中</button>
                </div>
            </div>
        </div>

        <div class="col-md-6 col-lg-4">
            <div class="card resource-card p-4" style="opacity: 0.7;">
                <div class="text-center">
                    <div class="card-icon">🌱</div>
                    <h3 class="fw-bold">淨零與永續</h3>
                    <p class="text-muted">iPAS 淨零規劃師筆記與企業碳盤查技術指引彙整。 (即將推出)</p>
                    <button class="btn btn-secondary mt-3" disabled>建構中</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div class="container text-center">
        <p>© 2026 職安技術研究室 | 基於專業實務與法規標準建置</p>
    </div>
</footer>

</body>
</html>
